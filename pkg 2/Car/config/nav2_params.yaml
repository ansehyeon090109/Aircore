# Nav2 파라미터 — 이 파일은 두 가지 모드에서 공유해서 씁니다.
#  1) 매핑 모드: slam_toolbox가 map->odom tf와 /map을 제공. nav2.launch.py가
#     navigation_launch.py(controller/planner/.../costmap)만 이 파일로 띄움.
#     이 모드에서는 아래 amcl 섹션은 아무도 안 읽음(로드 안 되니 무해).
#  2) 로컬라이제이션 모드: localization.launch.py가 map_server+amcl+
#     lifecycle_manager를 이 파일의 amcl 섹션으로 띄우고, 저장된 지도 위에서
#     자기 위치를 추정. slam_toolbox는 이 모드에서는 실행하지 않음(map->odom을
#     amcl과 동시에 발행하면 충돌하므로 두 모드를 동시에 켜지 말 것).
#
# robot_radius(0.15m), 속도 제한(vx_max 0.3 m/s 등)은 이 로봇의 대략적인 크기/
# 저속 사양에 맞춘 값입니다. 실제 로봇으로 넘어가면 꼭 실측값으로 다시 튜닝하세요.
#
# [실기 포팅용 임시 하향 조정 — TODO: 실측 후 재조정]
# 아래 표시된 속도/가속도/robot_radius/amcl alpha 값들은 실제 모터 최고속도,
# 배터리 전압, 바퀴-지면 마찰, 엔코더 분해능을 모르는 상태에서 안전 마진을
# 크게 두고 보수적으로 낮춘 가정값입니다. 시뮬레이션 값(원래 vx_max 0.3 등)
# 대비 절반 수준으로 줄여뒀으니, 실기 테스트 시 로봇이 너무 느리게 느껴지면
# 안전한 공간에서 조금씩 올리면서 재튜닝하세요.

# nav2_bringup navigation_launch.py가 docking_server도 기본으로 필수 관리
# 노드에 포함시키는데(이 프로젝트는 도킹 기능을 쓰지 않음), dock_plugins가
# 비어 있으면 configure 자체가 실패해서 전체 bringup이 중단됨. 실제로 도킹
# 액션을 호출하지 않으므로 nav2_bringup 기본값 그대로 최소 설정만 둠.
docking_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 50.0
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'

amcl:
  ros__parameters:
    use_sim_time: true
    # TODO: 실측 후 재조정. 실기 엔코더 오도메트리는 시뮬 오도메트리보다
    # 미끄러짐/분해능 한계로 잡음이 커서, 파티클 필터가 그 불확실성을
    # 과소평가하지 않도록 0.2 -> 0.3으로 보수적으로 상향.
    alpha1: 0.3
    alpha2: 0.3
    alpha3: 0.3
    alpha4: 0.3
    alpha5: 0.3
    # 이 프로젝트에는 base_footprint가 없고 URDF에 실제 존재하는 프레임은
    # base_link뿐이라 그대로 맞춤 (odom->base_link는 DiffDrive 플러그인이 발행).
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"
    laser_max_range: 12.0
    laser_min_range: 0.05
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

map_server:
  ros__parameters:
    use_sim_time: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.2

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      # TODO: 실측 후 재조정. 실제 모터 최고속도/가속도를 몰라서 시뮬 값
      # (vx_max 0.3, wz_max 1.2 등)의 절반 수준으로 안전 마진을 크게 두고
      # 낮춘 가정값. 실기에서 안전한 공간에 두고 조금씩 올려서 튜닝할 것.
      vx_max: 0.15
      vx_min: -0.1
      vy_max: 0.0
      wz_max: 0.6
      ax_max: 0.5
      ax_min: -0.5
      ay_max: 0.0
      ay_min: 0.0
      az_max: 1.0
      vx_std: 0.15
      vy_std: 0.0
      wz_std: 0.3
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic",
        ]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.4
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.4
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 0.5
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.4
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.0
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.4
        max_angle_to_furthest: 1.0
        mode: 0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # TODO: 실측 후 재조정. URDF 코너 배치(±80mm)상 대각선 반경은 약
      # 0.113m지만, 실기 오도메트리/조향 오차를 감안해 안전 마진을 더 두고
      # 0.15 -> 0.18로 상향.
      robot_radius: 0.18
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 10
        max_obstacle_height: 0.6
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.6
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      # TODO: local_costmap과 동일한 이유로 0.15 -> 0.18로 상향 (실측 후 재조정)
      robot_radius: 0.18
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.6
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      always_send_full_costmap: True

# nav2_bringup의 navigation_launch.py(이 프로젝트가 쓰는 Nav2 버전 1.3.x)가
# collision_monitor를 필수로 띄우는데, observation_sources 파라미터가 없으면
# configure에서 에러가 나서 lifecycle_manager가 전체 bringup을 중단시킴
# (이 프로젝트엔 기존에 이 섹션이 없었음 - 최신 Nav2 버전과의 파라미터 격차).
# 로컬 코스트맵 footprint 근접 정지만 최소로 설정.
collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.0
      max_height: 1.0
      enabled: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.3
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.3
    rotational_acc_lim: 2.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    # TODO: 실측 후 재조정. controller_server의 FollowPath와 동일한 이유로
    # 시뮬 값 대비 절반 수준으로 보수적으로 낮춤 — 반드시 같은 비율로 맞춰서
    # 바꿀 것(둘이 어긋나면 velocity_smoother가 controller 출력을 계속 깎음).
    max_velocity: [0.15, 0.0, 0.6]
    min_velocity: [-0.1, 0.0, -0.6]
    max_accel: [0.5, 0.0, 1.0]
    max_decel: [-0.5, 0.0, -1.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0